<div class="dashboard-page container-fluid">

  <!-- Header -->
  <div class="dashboard-header">
    <h3>My Dashboard</h3>
  </div>

  <!-- Profile Summary -->
  <div class="card p-3 mb-4">
    <div class="d-flex align-items-center gap-3">
      <div class="employee-avatar">JD</div>
      <div>
        <h5 class="mb-0">{{ currentUser()?.employeeName }}</h5>
        <small class="text-muted">{{ currentUser()?.designation }}</small>
      </div>
    </div>
  </div>

  <!-- Personal Info -->
  <div class="card p-3 mb-4">
    <h5 class="mb-3">My Details</h5>

    <div class="row">
      <div class="col-md-6"><strong>Email:</strong> {{ currentUser()?.email }}</div>
      <div class="col-md-6"><strong>Phone:</strong> {{ currentUser()?.phoneNo }}</div>
      <div class="col-md-6 mt-2"><strong>City:</strong> {{ currentUser()?.city }}</div>
      <div class="col-md-6 mt-2"><strong>State:</strong> {{ currentUser()?.state }}</div>
    </div>
  </div>

  <!-- Actions -->
  <div class="card p-3">
    <h5 class="mb-3">Actions</h5>

    <div class="d-flex gap-3">
      <button class="btn btn-warning text-white">Edit Profile</button>
    </div>
  </div>

</div>
