<form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-container">

  <h2>Add Employee</h2>

  <div class="grid">

    <div class="form-group">
      <label>Name</label>
      <input type="text" formControlName="employeeName">
    </div>

    <div class="form-group">
      <label>Phone</label>
      <input type="text" formControlName="phoneNo">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" formControlName="email">
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" formControlName="password">
    </div>

    <div class="form-group">
      <label>Confirm Password</label>
      <input type="password" formControlName="confirmPassword">

      @if (form.errors?.['passwordMismatch'] && form.controls.confirmPassword.touched) {
        <small>
          Passwords do not match
        </small>
      }
      
    </div>

    <div class="form-group">
      <label>Role</label>
      <input type="text" formControlName="role">
    </div>

    <div class="form-group">
      <label>City</label>
      <input type="text" formControlName="city">
    </div>

    <div class="form-group">
      <label>State</label>
      <input type="text" formControlName="state">
    </div>

    <div class="form-group">
      <label>Pincode</label>
      <input type="text" formControlName="pincode">
    </div>

    <div class="form-group full">
      <label>Address</label>
      <textarea formControlName="address"></textarea>
    </div>

    <div class="form-group">
      <label>Alt Phone</label>
      <input type="text" formControlName="altPhoneNo">
    </div>

    <div class="form-group">
      <label>Designation </label>
      <select formControlName="designationId">
        <option value="">Select Designation</option>
        @for(d of designations ; track d.designationId) {
          <option [value]="d.designationId">{{ d.designationName }}</option>
        }
      </select>
    </div>

  </div>
<!-- [disabled]="!form.invalid" -->
  <button type="submit" >
    Save
  </button>

</form>
